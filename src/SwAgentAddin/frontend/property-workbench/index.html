<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MechPilot Agent驾驶舱</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- 顶栏 -->
    <div class="topbar" id="topbar"></div>

    <!-- 中间区：Sidebar + 主内容 + AI面板 -->
    <div class="workspace" id="workspace">
      <!-- 左侧 Sidebar -->
      <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <span class="sidebar-logo">AICockpit</span>
          <button class="sidebar-toggle" id="sidebar-toggle" title="收起导航">◀</button>
        </div>
        <ul class="sidebar-nav" id="sidebar-nav">
          <li data-page="dashboard"><span class="nav-icon">&#x1F4CA;</span><span class="nav-label">总览</span></li>
          <li data-page="workspace"><span class="nav-icon">&#x1F6E0;</span><span class="nav-label">任务编排</span></li>
          <li data-page="assistant"><span class="nav-icon">&#x1F916;</span><span class="nav-label">AI助手</span></li>
          <li data-page="drawing"><span class="nav-icon">&#x1F4D0;</span><span class="nav-label">图纸审核</span></li>
          <li data-page="selection"><span class="nav-icon">&#x2699;</span><span class="nav-label">快速选型</span></li>
          <li data-page="material"><span class="nav-icon">&#x1F4E6;</span><span class="nav-label">物料检索</span></li>
          <li data-page="design"><span class="nav-icon">&#x1F4CF;</span><span class="nav-label">设计计算</span></li>
          <li data-page="agent"><span class="nav-icon">&#x1F4BC;</span><span class="nav-label">Agent任务</span></li>
          <li data-page="settings"><span class="nav-icon">&#x1F527;</span><span class="nav-label">设置</span></li>
        </ul>
        <div class="sidebar-footer">
          <div class="sidebar-version">
            <span class="sidebar-version-name">MechPilot Cockpit</span>
            <span class="sidebar-version-num">v0.4.16</span>
            <span class="sidebar-version-date">2026-06-28</span>
          </div>
        </div>
      </nav>

      <!-- 主内容区 -->
      <main class="page-container" id="page-container"></main>

      <!-- 右侧 AI 面板 -->
      <aside class="ai-panel" id="ai-panel">
        <div class="ai-panel-header">
          <span class="ai-panel-title">AI 对话</span>
          <button class="ai-panel-toggle" id="ai-panel-toggle" title="收起">&#x25B6;</button>
        </div>
        <div class="ai-panel-body">
          <div class="ai-messages" id="ai-messages"></div>
          <div class="ai-input-area">
            <textarea id="ai-input" placeholder="输入消息…" rows="2"></textarea>
            <button id="ai-send" title="发送">&#x27A4;</button>
          </div>
        </div>
      </aside>
    </div>

    <!-- 状态栏 -->
    <div class="statusbar" id="statusbar"></div>
  </div>

  <!-- 筛选弹层容器 -->
  <div id="filter-container"></div>

  <!-- Mock 数据（生产环境由 WebView2 注入，不引入此文件） -->
  <script src="mock-data.js"></script>
  <!-- 主逻辑 -->
  <script src="app.js"></script>
</body>
</html>
