<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 960 680" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="ah" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L10,3.5 L0,7Z" fill="#475569"/></marker>
    <marker id="ahBlue" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L10,3.5 L0,7Z" fill="#2563eb"/></marker>
    <marker id="ahGreen" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L10,3.5 L0,7Z" fill="#059669"/></marker>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/></filter>
    <linearGradient id="gServer" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#eff6ff"/><stop offset="100%" stop-color="#dbeafe"/></linearGradient>
    <linearGradient id="gWorker" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ecfdf5"/><stop offset="100%" stop-color="#d1fae5"/></linearGradient>
    <linearGradient id="gClient" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fafafa"/><stop offset="100%" stop-color="#f3f4f6"/></linearGradient>
    <linearGradient id="gPdm" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fef3c7"/><stop offset="100%" stop-color="#fde68a"/></linearGradient>
    <linearGradient id="gLlm" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ede9fe"/><stop offset="100%" stop-color="#ddd6fe"/></linearGradient>
  </defs>

  <!-- ===== LAYER LABELS ===== -->
  <text x="16" y="52" font-size="11" font-weight="700" fill="#64748b" letter-spacing="1">客户端层</text>
  <line x1="16" y1="58" x2="78" y2="58" stroke="#94a3b8" stroke-width="1"/>

  <text x="16" y="218" font-size="11" font-weight="700" fill="#64748b" letter-spacing="1">服务层</text>
  <line x1="16" y1="224" x2="60" y2="224" stroke="#94a3b8" stroke-width="1"/>

  <text x="16" y="588" font-size="11" font-weight="700" fill="#64748b" letter-spacing="1">执行层</text>
  <line x1="16" y1="594" x2="60" y2="594" stroke="#94a3b8" stroke-width="1"/>

  <!-- ===== CLIENT NODES ===== -->
  <!-- Eng A -->
  <g filter="url(#shadow)">
    <rect x="100" y="28" width="155" height="72" rx="8" fill="url(#gClient)" stroke="#d1d5db" stroke-width="1"/>
  </g>
  <rect x="100" y="28" width="155" height="22" rx="8" fill="#e5e7eb"/>
  <rect x="100" y="42" width="155" height="8" fill="#e5e7eb"/>
  <text x="177" y="44" font-size="11" font-weight="700" fill="#374151" text-anchor="middle">Engineer A</text>
  <text x="113" y="64" font-size="10" fill="#475569">SW + PDM Client</text>
  <text x="113" y="80" font-size="10" fill="#475569">SW Add-in (C#)</text>
  <circle cx="245" cy="64" r="6" fill="#22c55e"/><text x="245" y="67" font-size="7" fill="#fff" text-anchor="middle" font-weight="700">1</text>

  <!-- Eng B -->
  <g filter="url(#shadow)">
    <rect x="320" y="28" width="155" height="72" rx="8" fill="url(#gClient)" stroke="#d1d5db" stroke-width="1"/>
  </g>
  <rect x="320" y="28" width="155" height="22" rx="8" fill="#e5e7eb"/>
  <rect x="320" y="42" width="155" height="8" fill="#e5e7eb"/>
  <text x="397" y="44" font-size="11" font-weight="700" fill="#374151" text-anchor="middle">Engineer B</text>
  <text x="333" y="64" font-size="10" fill="#475569">SW + PDM Client</text>
  <text x="333" y="80" font-size="10" fill="#475569">SW Add-in (C#)</text>

  <!-- Eng N -->
  <g filter="url(#shadow)">
    <rect x="540" y="28" width="155" height="72" rx="8" fill="url(#gClient)" stroke="#d1d5db" stroke-width="1"/>
  </g>
  <rect x="540" y="28" width="155" height="22" rx="8" fill="#e5e7eb"/>
  <rect x="540" y="42" width="155" height="8" fill="#e5e7eb"/>
  <text x="617" y="44" font-size="11" font-weight="700" fill="#374151" text-anchor="middle">Engineer N</text>
  <text x="553" y="64" font-size="10" fill="#475569">SW + PDM Client</text>
  <text x="553" y="80" font-size="10" fill="#475569">SW Add-in (C#)</text>
  <text x="617" y="67" font-size="11" fill="#94a3b8" text-anchor="middle" font-style="italic">...</text>

  <!-- Dots between -->
  <text x="497" y="68" font-size="16" fill="#94a3b8" text-anchor="middle">···</text>

  <!-- ===== AGENT SERVER (big box) ===== -->
  <g filter="url(#shadow)">
    <rect x="50" y="200" width="860" height="355" rx="10" fill="url(#gServer)" stroke="#93c5fd" stroke-width="1.5"/>
  </g>
  <text x="480" y="194" font-size="12" font-weight="700" fill="#1e40af" text-anchor="middle">Agent Server (FastAPI + SQLite) — 部署在有外网的笔记本 / 企业服务器</text>

  <!-- --- REST API --- -->
  <rect x="75" y="218" width="130" height="58" rx="6" fill="#fff" stroke="#93c5fd" stroke-width="1"/>
  <text x="140" y="240" font-size="11" font-weight="700" fill="#1e40af" text-anchor="middle">REST API</text>
  <text x="140" y="255" font-size="9" fill="#64748b" text-anchor="middle">POST /task</text>
  <text x="140" y="267" font-size="9" fill="#64748b" text-anchor="middle">GET /task/{id}</text>

  <!-- Arrow: API → Task Queue -->
  <line x1="205" y1="247" x2="237" y2="247" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ahBlue)"/>

  <!-- --- Task Queue --- -->
  <rect x="240" y="218" width="125" height="58" rx="6" fill="#fff" stroke="#93c5fd" stroke-width="1"/>
  <text x="302" y="240" font-size="11" font-weight="700" fill="#1e40af" text-anchor="middle">Task Queue</text>
  <text x="302" y="255" font-size="9" fill="#64748b" text-anchor="middle">SQLite 持久化</text>
  <text x="302" y="267" font-size="9" fill="#64748b" text-anchor="middle">按优先级排队</text>

  <!-- Arrow: Queue → Router -->
  <line x1="365" y1="247" x2="397" y2="247" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ahBlue)"/>

  <!-- --- Router --- -->
  <rect x="400" y="218" width="125" height="58" rx="6" fill="#fff" stroke="#93c5fd" stroke-width="1"/>
  <text x="462" y="240" font-size="11" font-weight="700" fill="#1e40af" text-anchor="middle">Router</text>
  <text x="462" y="255" font-size="9" fill="#64748b" text-anchor="middle">判断执行路线:</text>
  <text x="462" y="267" font-size="9" fill="#64748b" text-anchor="middle">固定流程 or LLM</text>

  <!-- Arrow: Router → Rule Engine -->
  <path d="M462,276 L462,295 L370,295 L370,316" stroke="#2563eb" stroke-width="1.2" fill="none" marker-end="url(#ahBlue)"/>
  <text x="415" y="292" font-size="9" fill="#059669" font-weight="600">80%</text>

  <!-- Arrow: Router → LLM Agent -->
  <path d="M462,276 L462,295 L555,295 L555,316" stroke="#2563eb" stroke-width="1.2" fill="none" marker-end="url(#ahBlue)"/>
  <text x="510" y="292" font-size="9" fill="#7c3aed" font-weight="600">20%</text>

  <!-- --- Rule Engine --- -->
  <rect x="305" y="320" width="130" height="52" rx="6" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="370" y="342" font-size="11" font-weight="700" fill="#059669" text-anchor="middle">Rule Engine</text>
  <text x="370" y="357" font-size="9" fill="#475569" text-anchor="middle">async 高并发</text>
  <text x="370" y="368" font-size="9" fill="#475569" text-anchor="middle">不调用 LLM</text>

  <!-- --- LLM Agent --- -->
  <rect x="490" y="320" width="130" height="52" rx="6" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="555" y="342" font-size="11" font-weight="700" fill="#7c3aed" text-anchor="middle">LLM Agent</text>
  <text x="555" y="357" font-size="9" fill="#475569" text-anchor="middle">编排 + 报告生成</text>
  <text x="555" y="368" font-size="9" fill="#475569" text-anchor="middle">2~5s 编排后释放</text>

  <!-- Arrow: Rule Engine → Worker Pool -->
  <path d="M370,372 L370,390 L480,390" stroke="#059669" stroke-width="1.2" fill="none" marker-end="url(#ahGreen)"/>

  <!-- Arrow: LLM Agent → Worker Pool -->
  <path d="M555,372 L555,390 L480,390" stroke="#7c3aed" stroke-width="1.2" fill="none" marker-end="url(#ah)"/>

  <!-- --- Worker Pool Manager --- -->
  <rect x="115" y="380" width="750" height="52" rx="6" fill="#fff" stroke="#93c5fd" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="490" y="400" font-size="11" font-weight="700" fill="#1e40af" text-anchor="middle">Worker Pool Manager</text>
  <text x="490" y="418" font-size="9" fill="#475569" text-anchor="middle">负载均衡 + 心跳检测 + 文件亲和性调度 + PDM 锁预检 + 故障转移</text>

  <!-- Worker dots inside pool -->
  <circle cx="140" cy="410" r="5" fill="#22c55e"/><text x="152" y="414" font-size="8" fill="#475569">WS-1 IDLE</text>
  <circle cx="240" cy="410" r="5" fill="#f59e0b"/><text x="252" y="414" font-size="8" fill="#475569">WS-2 BUSY</text>
  <circle cx="355" cy="404" r="5" fill="#22c55e"/><text x="367" y="408" font-size="8" fill="#475569">WS-3 IDLE</text>
  <text x="480" y="414" font-size="8" fill="#94a3b8">WS-4 IDLE</text>
  <text x="575" y="414" font-size="8" fill="#94a3b8">WS-N ...</text>

  <!-- --- Rule Store --- -->
  <rect x="115" y="450" width="750" height="48" rx="6" fill="#fff" stroke="#93c5fd" stroke-width="1"/>
  <text x="135" y="470" font-size="11" font-weight="700" fill="#1e40af">Rule Store</text>
  <text x="135" y="486" font-size="9" fill="#475569">Markdown 知识库 (rules/*.md)</text>
  <text x="340" y="478" font-size="9" fill="#64748b">general/ 属性字段定义</text>
  <text x="530" y="478" font-size="9" fill="#64748b">materials/ 表面处理规则</text>
  <text x="730" y="478" font-size="9" fill="#64748b">categories/ 分类映射</text>
  <rect x="810" y="458" width="42" height="20" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="0.8"/>
  <text x="831" y="472" font-size="9" fill="#059669" text-anchor="middle" font-weight="600">热加载</text>

  <!-- Arrow: Rule Store → Router (dashed, knowledge injection) -->
  <path d="M135,450 L135,280" stroke="#93c5fd" stroke-width="1" stroke-dasharray="4 3" fill="none" marker-end="url(#ahBlue)"/>
  <text x="100" y="365" font-size="8" fill="#64748b" writing-mode="tb">规则注入 prompt</text>

  <!-- --- Report + Notify --- -->
  <rect x="115" y="510" width="355" height="36" rx="6" fill="#fff" stroke="#93c5fd" stroke-width="1"/>
  <text x="135" y="532" font-size="11" font-weight="700" fill="#1e40af">Report Generator</text>
  <text x="300" y="532" font-size="9" fill="#475569">任务完成后 LLM 生成人类可读报告</text>

  <rect x="510" y="510" width="355" height="36" rx="6" fill="#fff" stroke="#93c5fd" stroke-width="1"/>
  <text x="530" y="532" font-size="11" font-weight="700" fill="#1e40af">Notifier</text>
  <text x="630" y="532" font-size="9" fill="#475569">Add-in 推送 + 飞书卡片消息</text>
  <rect x="810" y="516" width="42" height="20" rx="4" fill="#dbeafe" stroke="#93c5fd" stroke-width="0.8"/>
  <text x="831" y="530" font-size="9" fill="#1e40af" text-anchor="middle" font-weight="600">双通道</text>

  <!-- Arrow: Report → Notify -->
  <line x1="470" y1="528" x2="508" y2="528" stroke="#2563eb" stroke-width="1" marker-end="url(#ahBlue)"/>

  <!-- ===== LLM Cloud ===== -->
  <g filter="url(#shadow)">
    <rect x="100" y="580" width="810" height="50" rx="8" fill="url(#gLlm)" stroke="#c4b5fd" stroke-width="1.2"/>
  </g>
  <text x="505" y="601" font-size="12" font-weight="700" fill="#5b21b6" text-anchor="middle">LLM Cloud</text>
  <text x="505" y="618" font-size="10" fill="#6d28d9" text-anchor="middle">火山方舟 (DeepSeek-V4) / Claude API — 任务编排推理 + 报告内容生成</text>

  <!-- Arrow: Server → LLM Cloud -->
  <line x1="505" y1="555" x2="505" y2="578" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="520" y="570" font-size="8" fill="#7c3aed">HTTPS</text>

  <!-- ===== MCP WORKER NODES ===== -->
  <!-- WS1 -->
  <g filter="url(#shadow)">
    <rect x="100" y="656" width="160" height="14" rx="4" fill="url(#gWorker)" stroke="#6ee7b7" stroke-width="1"/>
  </g>
  <text x="180" y="667" font-size="10" font-weight="600" fill="#059669" text-anchor="middle">Workstation 1</text>

  <!-- WS2 -->
  <g filter="url(#shadow)">
    <rect x="320" y="656" width="160" height="14" rx="4" fill="url(#gWorker)" stroke="#6ee7b7" stroke-width="1"/>
  </g>
  <text x="400" y="667" font-size="10" font-weight="600" fill="#059669" text-anchor="middle">Workstation 2</text>

  <!-- WS N -->
  <g filter="url(#shadow)">
    <rect x="540" y="656" width="160" height="14" rx="4" fill="url(#gWorker)" stroke="#6ee7b7" stroke-width="1"/>
  </g>
  <text x="620" y="667" font-size="10" font-weight="600" fill="#059669" text-anchor="middle">Workstation N</text>
  <text x="770" y="667" font-size="12" fill="#94a3b8">···</text>

  <!-- ===== PDM Vault ===== -->
  <g filter="url(#shadow)">
    <rect x="752" y="218" width="140" height="58" rx="6" fill="url(#gPdm)" stroke="#fbbf24" stroke-width="1.2"/>
  </g>
  <text x="822" y="240" font-size="11" font-weight="700" fill="#92400e" text-anchor="middle">PDM Vault</text>
  <text x="822" y="255" font-size="9" fill="#78350f" text-anchor="middle">SQL Server</text>
  <text x="822" y="267" font-size="9" fill="#78350f" text-anchor="middle">10.254.62.8</text>

  <!-- ===== ARROWS: Client → Server ===== -->
  <line x1="177" y1="100" x2="177" y2="200" stroke="#475569" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="397" y1="100" x2="397" y2="200" stroke="#475569" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="617" y1="100" x2="617" y2="200" stroke="#475569" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="175" y="150" font-size="8" fill="#475569" text-anchor="end">HTTP</text>

  <!-- Arrow: Worker Pool → Report Generator (task done, result flows up) -->
  <path d="M75,432 L75,510 L115,528" stroke="#2563eb" stroke-width="1" stroke-dasharray="4 3" fill="none" marker-end="url(#ahBlue)"/>
  <text x="65" y="475" font-size="8" fill="#2563eb" text-anchor="end">执行</text>
  <text x="65" y="486" font-size="8" fill="#2563eb" text-anchor="end">结果</text>

  <!-- ===== ARROWS: Server → Workers (MCP) ===== -->
  <line x1="180" y1="555" x2="180" y2="654" stroke="#059669" stroke-width="1.5" marker-end="url(#ahGreen)"/>
  <line x1="400" y1="555" x2="400" y2="654" stroke="#059669" stroke-width="1.5" marker-end="url(#ahGreen)"/>
  <line x1="620" y1="555" x2="620" y2="654" stroke="#059669" stroke-width="1.5" marker-end="url(#ahGreen)"/>
  <text x="175" y="605" font-size="8" fill="#059669" text-anchor="end">MCP</text>

  <!-- ===== ARROWS: Workers ↔ PDM ===== -->
  <path d="M822,276 L822,666 L702,666" stroke="#d97706" stroke-width="1" stroke-dasharray="4 3" fill="none" marker-end="url(#ah)"/>
  <text x="870" y="460" font-size="8" fill="#d97706" writing-mode="tb" letter-spacing="2">检入/检出</text>

  <!-- ===== LEGEND ===== -->
  <rect x="750" y="32" width="190" height="106" rx="6" fill="#fff" stroke="#e5e7eb" stroke-width="1" filter="url(#shadow)"/>
  <text x="845" y="50" font-size="10" font-weight="700" fill="#374151" text-anchor="middle">图例</text>
  <line x1="760" y1="57" x2="930" y2="57" stroke="#e5e7eb" stroke-width="0.5"/>
  <rect x="765" y="64" width="16" height="10" rx="2" fill="url(#gClient)" stroke="#d1d5db" stroke-width="0.5"/>
  <text x="788" y="73" font-size="9" fill="#475569">工程师 Desktop</text>
  <rect x="765" y="80" width="16" height="10" rx="2" fill="url(#gServer)" stroke="#93c5fd" stroke-width="0.5"/>
  <text x="788" y="89" font-size="9" fill="#475569">Agent Server</text>
  <rect x="765" y="96" width="16" height="10" rx="2" fill="url(#gWorker)" stroke="#6ee7b7" stroke-width="0.5"/>
  <text x="788" y="105" font-size="9" fill="#475569">MCP Worker</text>
  <rect x="765" y="112" width="16" height="10" rx="2" fill="url(#gPdm)" stroke="#fbbf24" stroke-width="0.5"/>
  <text x="788" y="121" font-size="9" fill="#475569">PDM Vault</text>
  <rect x="765" y="128" width="16" height="10" rx="2" fill="url(#gLlm)" stroke="#c4b5fd" stroke-width="0.5"/>
  <text x="788" y="137" font-size="9" fill="#475569">LLM Cloud</text>

</svg>